# Application bindings
bindd = ALT, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = ALT CTRL, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = ALT SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = ALT SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = ALT CTRL SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = ALT SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = ALT CTRL SHIFT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = ALT SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = ALT CTRL SHIFT, M, Music TUI, exec, omarchy-launch-or-focus-tui cliamp
bindd = ALT SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = ALT SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = ALT SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = ALT SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian"
bindd = ALT SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = ALT SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent Hyprland treating it as a comment.
bindd = ALT SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = ALT CTRL SHIFT, A, Grok, exec, omarchy-launch-webapp "Grok" "https://grok.com"
bindd = ALT SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = ALT SHIFT, E, Email, exec, omarchy-launch-webapp "https://gmail.com"
bindd = ALT SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = ALT CTRL SHIFT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = ALT SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = ALT SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = ALT CTRL SHIFT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"
bindd = ALT, D, Launch apps, exec, omarchy-launch-walker

# Copy / Paste
bindd = SUPER, C, Universal copy, sendshortcut, CTRL, Insert, activewindow
bindd = SUPER, V, Universal paste, sendshortcut, SHIFT, Insert, activewindow
bindd = SUPER, X, Universal cut, sendshortcut, CTRL, X, activewindow
bindd = SUPER CTRL, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard

# Close windows
bindd = ALT, W, Close window, killactive,
bindd = CTRL ALT, DELETE, Close all windows, exec, omarchy-hyprland-window-close-all

# Control tiling
bindd = SUPER, J, Toggle window split, layoutmsg, togglesplit
bindd = ALT, P, Pseudo window, pseudo, # dwindle
bindd = ALT, T, Toggle window floating/tiling, togglefloating,
bindd = ALT, F, Full screen, fullscreen, 0
bindd = ALT CTRL, F, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER ALT, F, Full width, fullscreen, 1
bindd = ALT, O, Pop window out (float & pin), exec, omarchy-hyprland-window-pop
bindd = SUPER, L, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle

# Move focus
bindd = ALT, LEFT, Focus on left window, movefocus, l
bindd = ALT, RIGHT, Focus on right window, movefocus, r
bindd = ALT, UP, Focus on above window, movefocus, u
bindd = ALT, DOWN, Focus on below window, movefocus, d
bindd = ALT, H, Focus on left window, movefocus, l
bindd = ALT, J, Focus on below window, movefocus, d
bindd = ALT, K, Focus on above window, movefocus, u
bindd = ALT, L, Focus on right window, movefocus, r

# Switch workspaces
bindd = ALT, code:10, Switch to workspace 1, workspace, 1
bindd = ALT, code:11, Switch to workspace 2, workspace, 2
bindd = ALT, code:12, Switch to workspace 3, workspace, 3
bindd = ALT, code:13, Switch to workspace 4, workspace, 4
bindd = ALT, code:14, Switch to workspace 5, workspace, 5
bindd = ALT, code:15, Switch to workspace 6, workspace, 6
bindd = ALT, code:16, Switch to workspace 7, workspace, 7
bindd = ALT, code:17, Switch to workspace 8, workspace, 8
bindd = ALT, code:18, Switch to workspace 9, workspace, 9
bindd = ALT, code:19, Switch to workspace 10, workspace, 10

# Move active window to a workspace
bindd = ALT SHIFT, code:10, Move window to workspace 1, movetoworkspace, 1
bindd = ALT SHIFT, code:11, Move window to workspace 2, movetoworkspace, 2
bindd = ALT SHIFT, code:12, Move window to workspace 3, movetoworkspace, 3
bindd = ALT SHIFT, code:13, Move window to workspace 4, movetoworkspace, 4
bindd = ALT SHIFT, code:14, Move window to workspace 5, movetoworkspace, 5
bindd = ALT SHIFT, code:15, Move window to workspace 6, movetoworkspace, 6
bindd = ALT SHIFT, code:16, Move window to workspace 7, movetoworkspace, 7
bindd = ALT SHIFT, code:17, Move window to workspace 8, movetoworkspace, 8
bindd = ALT SHIFT, code:18, Move window to workspace 9, movetoworkspace, 9
bindd = ALT SHIFT, code:19, Move window to workspace 10, movetoworkspace, 10

# Move active window silently to a workspace
bindd = ALT SHIFT CTRL, code:10, Move window silently to workspace 1, movetoworkspacesilent, 1
bindd = ALT SHIFT CTRL, code:11, Move window silently to workspace 2, movetoworkspacesilent, 2
bindd = ALT SHIFT CTRL, code:12, Move window silently to workspace 3, movetoworkspacesilent, 3
bindd = ALT SHIFT CTRL, code:13, Move window silently to workspace 4, movetoworkspacesilent, 4
bindd = ALT SHIFT CTRL, code:14, Move window silently to workspace 5, movetoworkspacesilent, 5
bindd = ALT SHIFT CTRL, code:15, Move window silently to workspace 6, movetoworkspacesilent, 6
bindd = ALT SHIFT CTRL, code:16, Move window silently to workspace 7, movetoworkspacesilent, 7
bindd = ALT SHIFT CTRL, code:17, Move window silently to workspace 8, movetoworkspacesilent, 8
bindd = ALT SHIFT CTRL, code:18, Move window silently to workspace 9, movetoworkspacesilent, 9
bindd = ALT SHIFT CTRL, code:19, Move window silently to workspace 10, movetoworkspacesilent, 10

# Scratchpad and workspace cycling
bindd = ALT, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad
bindd = SUPER, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER CTRL, TAB, Former workspace, workspace, previous

# Move workspaces to other monitors
bindd = ALT SHIFT CTRL, LEFT, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = ALT SHIFT CTRL, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = ALT SHIFT CTRL, UP, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = ALT SHIFT CTRL, DOWN, Move workspace to down monitor, movecurrentworkspacetomonitor, d

# Swap active window with the one next to it
bindd = ALT SHIFT, LEFT, Swap window to the left, swapwindow, l
bindd = ALT SHIFT, RIGHT, Swap window to the right, swapwindow, r
bindd = ALT SHIFT, UP, Swap window up, swapwindow, u
bindd = ALT SHIFT, DOWN, Swap window down, swapwindow, d

# Cycle through applications and monitors
bindd = ALT, TAB, Focus on next window, cyclenext
bindd = ALT SHIFT, TAB, Focus on previous window, cyclenext, prev
bindd = ALT, TAB, Reveal active window on top, bringactivetotop
bindd = ALT SHIFT, TAB, Reveal active window on top, bringactivetotop
bindd = CTRL ALT, TAB, Focus on next monitor, focusmonitor, +1
bindd = CTRL ALT SHIFT, TAB, Focus on previous monitor, focusmonitor, -1

# Resize active window
bindd = ALT, code:20, Expand window left, resizeactive, -100 0
bindd = ALT, code:21, Shrink window left, resizeactive, 100 0
bindd = ALT SHIFT, code:20, Shrink window up, resizeactive, 0 -100
bindd = ALT SHIFT, code:21, Expand window down, resizeactive, 0 100

# Mouse window/workspace controls
bindd = ALT, mouse_down, Scroll active workspace forward, workspace, e+1
bindd = ALT, mouse_up, Scroll active workspace backward, workspace, e-1
bindmd = ALT, mouse:272, Move window, movewindow
bindmd = ALT, mouse:273, Resize window, resizewindow

# Groups
bindd = ALT, G, Toggle window grouping, togglegroup
bindd = ALT CTRL, G, Move active window out of group, moveoutofgroup
bindd = SUPER ALT, LEFT, Move window to group on left, moveintogroup, l
bindd = SUPER ALT, RIGHT, Move window to group on right, moveintogroup, r
bindd = SUPER ALT, UP, Move window to group on top, moveintogroup, u
bindd = SUPER ALT, DOWN, Move window to group on bottom, moveintogroup, d
bindd = SUPER ALT, TAB, Next window in group, changegroupactive, f
bindd = SUPER ALT SHIFT, TAB, Previous window in group, changegroupactive, b
bindd = ALT CTRL, LEFT, Move grouped window focus left, changegroupactive, b
bindd = ALT CTRL, RIGHT, Move grouped window focus right, changegroupactive, f
bindd = ALT CTRL, mouse_down, Next window in group, changegroupactive, f
bindd = ALT CTRL, mouse_up, Previous window in group, changegroupactive, b
bindd = ALT CTRL, code:10, Switch to group window 1, changegroupactive, 1
bindd = ALT CTRL, code:11, Switch to group window 2, changegroupactive, 2
bindd = ALT CTRL, code:12, Switch to group window 3, changegroupactive, 3
bindd = ALT CTRL, code:13, Switch to group window 4, changegroupactive, 4
bindd = ALT CTRL, code:14, Switch to group window 5, changegroupactive, 5

# Monitor scaling
bindd = ALT, code:61, Cycle monitor scaling, exec, omarchy-hyprland-monitor-scaling-cycle
bindd = ALT CTRL, code:61, Cycle monitor scaling backwards, exec, omarchy-hyprland-monitor-scaling-cycle --reverse

# Menus
bindd = ALT, SPACE, Launch apps, exec, omarchy-launch-walker
bindd = ALT CTRL, E, Emoji picker, exec, omarchy-launch-walker -m symbols
bindd = ALT CTRL, C, Capture menu, exec, omarchy-menu capture
bindd = ALT CTRL, O, Toggle menu, exec, omarchy-menu toggle
bindd = ALT CTRL, H, Hardware menu, exec, omarchy-menu hardware
bindd = SUPER ALT, SPACE, Omarchy menu, exec, omarchy-menu
bindd = ALT SHIFT, code:201, Omarchy menu, exec, omarchy-menu
bindd = ALT, ESCAPE, System menu, exec, omarchy-menu system
bindld = , XF86PowerOff, Power menu, exec, omarchy-menu system
bindd = SUPER, K, Show key bindings, exec, omarchy-menu-keybindings
bindd = , XF86Calculator, Calculator, exec, gnome-calculator

# Aesthetics
bindd = ALT SHIFT, SPACE, Toggle top bar, exec, omarchy-toggle-waybar
bindd = ALT CTRL, SPACE, Theme background menu, exec, omarchy-menu background
bindd = ALT SHIFT CTRL, SPACE, Theme menu, exec, omarchy-menu theme
bindd = ALT, BACKSPACE, Toggle window transparency, exec, omarchy-hyprland-window-transparency-toggle
bindd = ALT SHIFT, BACKSPACE, Toggle window gaps, exec, omarchy-hyprland-window-gaps-toggle
bindd = ALT CTRL, BACKSPACE, Toggle single-window square aspect, exec, omarchy-hyprland-window-single-square-aspect-toggle

# Notifications
bindd = ALT, COMMA, Dismiss last notification, exec, makoctl dismiss
bindd = ALT SHIFT, COMMA, Dismiss all notifications, exec, makoctl dismiss --all
bindd = ALT CTRL, COMMA, Toggle silencing notifications, exec, omarchy-toggle-notification-silencing
bindd = SUPER ALT, COMMA, Invoke last notification, exec, makoctl invoke
bindd = ALT SHIFT CTRL, COMMA, Restore last notification, exec, makoctl restore

# Toggles
bindd = ALT CTRL, I, Toggle locking on idle, exec, omarchy-toggle-idle
bindd = ALT CTRL, N, Toggle nightlight, exec, omarchy-toggle-nightlight
bindd = SUPER CTRL, Delete, Toggle laptop display, exec, omarchy-hyprland-monitor-internal toggle
bindd = SUPER CTRL ALT, Delete, Toggle laptop display mirroring, exec, omarchy-hyprland-monitor-internal-mirror toggle
bindl = , switch:on:Lid Switch, exec, omarchy-hw-external-monitors && omarchy-hyprland-monitor-internal off
bindl = , switch:off:Lid Switch, exec, omarchy-hyprland-monitor-internal on

# Captures
bindd = , PRINT, Screenshot, exec, omarchy-capture-screenshot
bindd = ALT, PRINT, Screenrecording, exec, omarchy-menu screenrecord
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a
bindd = ALT CTRL, PRINT, Extract text (OCR) from screenshot, exec, omarchy-capture-text-extraction

# File sharing, transcoding, and reminders
bindd = ALT CTRL, S, Share, exec, omarchy-menu share
bindd = ALT CTRL, PERIOD, Transcode, exec, omarchy-transcode
bindd = ALT CTRL, R, Set reminder, exec, omarchy-menu reminder-set
bindd = SUPER CTRL ALT, R, Show reminders, exec, omarchy-reminder show
bindd = ALT SHIFT CTRL, R, Clear reminders, exec, omarchy-reminder clear

# Waybar-less information
bindd = SUPER CTRL ALT, T, Show time, exec, notify-send -u low "    $(date +"%A %H:%M  ·  %d %B %Y  ·  Week %V")"
bindd = SUPER CTRL ALT, B, Show battery remaining, exec, notify-send -u low "$(omarchy-battery-status)"
bindd = SUPER CTRL ALT, W, Show weather, exec, notify-send -u low "$(omarchy-weather-status)"

# Control panels
bindd = ALT CTRL, A, Audio controls, exec, omarchy-launch-audio
bindd = ALT CTRL, B, Bluetooth controls, exec, omarchy-launch-bluetooth
bindd = ALT CTRL, W, Wifi controls, exec, omarchy-launch-wifi
bindd = ALT CTRL, T, Activity, exec, omarchy-launch-tui btop

# Dictation
bindd = ALT CTRL, X, Toggle dictation, exec, voxtype record toggle
bindd  = , F9, Start dictation (push-to-talk), exec, voxtype record start
binddr = , F9, Stop dictation (push-to-talk),  exec, voxtype record stop

# Zoom and lock
bindd = ALT CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1
bindd = ALT CTRL, L, Lock system, exec, omarchy-system-lock

# Laptop multimedia keys for volume and LCD brightness
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, omarchy-swayosd-client --output-volume raise
bindeld = ,XF86AudioLowerVolume, Volume down, exec, omarchy-swayosd-client --output-volume lower
bindeld = ,XF86AudioMute, Mute, exec, omarchy-swayosd-client --output-volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, omarchy-audio-input-mute
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, omarchy-brightness-display +5%
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, omarchy-brightness-display 5%-
bindeld = SHIFT, XF86MonBrightnessUp, Brightness maximum, exec, omarchy-brightness-display 100%
bindeld = SHIFT, XF86MonBrightnessDown, Brightness minimum, exec, omarchy-brightness-display 1%
bindeld = ,XF86KbdBrightnessUp, Keyboard brightness up, exec, omarchy-brightness-keyboard up
bindeld = ,XF86KbdBrightnessDown, Keyboard brightness down, exec, omarchy-brightness-keyboard down
bindld = ,XF86KbdLightOnOff, Keyboard backlight cycle, exec, omarchy-brightness-keyboard cycle
bindld = ,XF86TouchpadToggle, Toggle touchpad, exec, omarchy-toggle-touchpad
bindld = ,XF86TouchpadOn, Enable touchpad, exec, omarchy-toggle-touchpad on
bindld = ,XF86TouchpadOff, Disable touchpad, exec, omarchy-toggle-touchpad off

# Precise 1% multimedia adjustments with Alt modifier
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, omarchy-swayosd-client --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, omarchy-swayosd-client --output-volume -1
bindeld = ALT, XF86MonBrightnessUp, Brightness up precise, exec, omarchy-brightness-display +1%
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise, exec, omarchy-brightness-display 1%-

# Requires playerctl
bindld = , XF86AudioNext, Next track, exec, omarchy-swayosd-client --playerctl next
bindld = , XF86AudioPause, Pause, exec, omarchy-swayosd-client --playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, omarchy-swayosd-client --playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, omarchy-swayosd-client --playerctl previous
bindld = ALT, XF86AudioMute, Switch audio output, exec, omarchy-audio-output-switch
